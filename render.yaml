services:
  # Backend API Service
  - type: web
    name: amazon-now-ai-backend
    env: python
    region: oregon
    plan: free
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /

  # Frontend Service
  - type: web
    name: amazon-now-ai-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: amazon-now-ai-backend
          property: host
      - key: NODE_VERSION
        value: "20"
